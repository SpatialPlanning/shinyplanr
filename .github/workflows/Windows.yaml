# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: Windows

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: windows-latest, r: 'release'}

    env:
      _R_REMOTES_NO_ERRORS_FROM_WARNINGS_: true
      _R_CHECK_FORCE_SUGGESTS_: false
      _R_CHECK_TIMINGS_: 10
      _R_CHECK_CRAN_INCOMING_REMOTE_: false
      CI: true
      NOT_CRAN: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Install CBC Solver
        shell: pwsh
        run: |
          # Update $version here to upgrade CBC
          $version = "2.10.13"
          $arch    = "x86_64-w64-mingw64"
          $name    = "Cbc-releases.$version-$arch"

          # Download release zip
          Invoke-WebRequest -Uri "https://github.com/coin-or/Cbc/releases/download/releases%2F$version/$name.zip" -OutFile "cbc.zip"

          # Extract the archive
          Expand-Archive -Path "cbc.zip" -DestinationPath "C:\cbc"

          # Add the bin directory to the GitHub Actions PATH for subsequent steps
          echo "C:\cbc\$name\bin" >> $env:GITHUB_PATH

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 7
          extra-packages: |
            any::rcmdcheck
            any::remotes
            any::slam
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--no-vignettes", "--no-build-vignettes", "--ignore-vignettes")'
          build_args: 'c("--no-build-vignettes")'
          error-on: '"error"'
          check-dir: '"check"'
          upload-snapshots: true
