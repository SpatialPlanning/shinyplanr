project:
  type: default
  output-dir: ../../docs

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 4
    toc-expand: 2
    toc-location: left
    number-sections: true
    number-depth: 3
    code-fold: true
    code-tools: true
    code-copy: true
    highlight-style: github
    lang: en-GB
    link-external-newwindow: true
    smooth-scroll: true
    self-contained: true

execute:
  echo: true
  warning: false
  message: false

bibliography: references.bib
