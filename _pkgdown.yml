url: https://spatialplanning.github.io/shinyplanr

template:
  bootstrap: 5

home:
  title: "shinyplanr — Spatial Planning in Shiny"
  description: >
    A golem-based Shiny application package that provides an interactive
    graphical user interface for spatial conservation prioritisation using
    the prioritizr R package.

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [search, github]
  components:
    github:
      icon: fab fa-github
      href: https://github.com/SpatialPlanning/shinyplanr
      aria-label: GitHub

